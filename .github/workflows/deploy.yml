name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH and Deploy
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -x
          if [ -z "$SSH_HOST" ]; then echo "❌ Erro: SSH_HOST está vazio"; exit 1; fi
          if [ -z "$SSH_USER" ]; then echo "❌ Erro: SSH_USER está vazio"; exit 1; fi
          
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          echo "🔍 Fazendo scan do host..."
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
          
          echo "🔍 Tentando conectar..."
          ssh -i ~/.ssh/id_rsa -v -o ConnectTimeout=15 "$SSH_USER@$SSH_HOST" << 'EOF'
            echo "🚀 Conexão estabelecida!"
            cd ~/htdocs/garciaalves.adv.br
            bash deploy.sh
          EOF
          set +x
